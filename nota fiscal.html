<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Nota</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 300px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input[type="text"],
        input[type="tel"],
        textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .nota {
            margin-top: 20px;
            padding: 20px;
            background-color: #e9ecef;
            border-radius: 8px;
            display: none;
        }

        .nota p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gerador de Nota de Serviço</h1>
        <form id="notaForm">
            <label for="nome">Nome do Cliente:</label>
            <input type="text" id="nome" name="nome" required>

            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" name="cpf" required>

            <label for="endereco">Endereço:</label>
            <input type="text" id="endereco" name="endereco" required>

            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" name="telefone" required>

            <label for="observacao">Observações:</label>
            <textarea id="observacao" name="observacao"></textarea>

            <button type="submit">Gerar Nota</button>
        </form>

        <div id="nota" class="nota">
            <!-- A nota será gerada aqui -->
        </div>
    </div>
    
    <script>
        document.getElementById("notaForm").addEventListener("submit", function(event) {
            event.preventDefault();
    
            // Coletar os dados do formulário
            let nome = document.getElementById("nome").value;
            let cpf = document.getElementById("cpf").value;
            let endereco = document.getElementById("endereco").value;
            let telefone = document.getElementById("telefone").value;
            let observacao = document.getElementById("observacao").value;
    
            // Gerar a nota
            let notaHTML = `
                <h2>Nota Fiscal de Serviço</h2>
                <p><strong>Nome do Cliente:</strong> ${nome}</p>
                <p><strong>CPF:</strong> ${cpf}</p>
                <p><strong>Endereço:</strong> ${endereco}</p>
                <p><strong>Telefone:</strong> ${telefone}</p>
                <p><strong>Observações:</strong> ${observacao}</p>
            `;
    
            // Exibir a nota na página
            let notaDiv = document.getElementById("nota");
            notaDiv.innerHTML = notaHTML;
            notaDiv.style.display = "block";
        });
    </script>
</body>
</html>
